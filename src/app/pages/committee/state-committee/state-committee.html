<div class="min-h-screen bg-slate-50 pt-24 pb-12">
  <div class="max-w-7xl mx-auto px-6">
    <div class="text-center mb-16">
      <h1 class="text-4xl md:text-5xl font-bold text-primary mb-4">State Committee</h1>
      <p class="text-slate-600 max-w-2xl mx-auto">Our dedicated State Committee members working towards educational excellence in their regions.</p>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-6">
      <div *ngFor="let member of members" class="group bg-white rounded-2xl overflow-hidden shadow-sm hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1">
        <div class="aspect-[3/4] overflow-hidden bg-slate-200 relative">
          <!-- Placeholder avatar if no image -->
          <div class="absolute inset-0 flex items-center justify-center text-slate-400">
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </div>
          <!-- Actual image -->
          <img [src]="member.image" [alt]="member.name" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110 opacity-0" (load)="extractImage($event)">
        </div>
        <div class="p-4 text-center">
          <h3 class="font-bold text-slate-800 text-sm mb-1 group-hover:text-primary transition-colors">{{ member.name }}</h3>
          <p class="text-xs text-slate-500 font-medium uppercase tracking-wider">{{ member.role }}</p>
        </div>
      </div>
    </div>
  </div>
</div>
